<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UNO Ukraine - Multiplayer</title>
    <style>
        /* Стилі залишаються такими ж, як у попередній версії, можна трохи доповнити для форми */
        .lobby {
            background: rgba(0,0,0,0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .lobby input, .lobby button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
        }
        .lobby button {
            background: #ffd700;
            color: #0057b7;
            font-weight: bold;
            cursor: pointer;
        }
        .players-list {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            color: white;
        }
        .player {
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 20px;
        }
        .player.current {
            background: #ffd700;
            color: #0057b7;
            font-weight: bold;
        }
        .card.other-player {
            opacity: 0.7;
            filter: blur(2px);
            cursor: default;
        }
        /* решта стилів з попередньої версії */
    </style>
</head>
<body>
<div class="game-container">
    <div class="lobby" id="lobby">
        <h3>🎮 UNO Ukraine – Гра з друзями</h3>
        <input type="text" id="playerName" placeholder="Ваше ім'я" value="Гравець">
        <input type="text" id="roomCode" placeholder="Код кімнати">
        <button id="createRoom">Створити кімнату</button>
        <button id="joinRoom">Приєднатися</button>
    </div>

    <div id="gameArea" style="display: none;">
        <div class="top-card">
            <h3>🇺🇦 Карта на столі 🇺🇦</h3>
            <div id="tableCard" class="card"></div>
        </div>

        <div class="players-list" id="playersList"></div>

        <div class="hand">
            <h3>Ваші карти</h3>
            <div id="playerHand"></div>
            <div>
                <button id="drawBtn">Взяти карту</button>
                <button id="resetBtn">Нова гра</button>
            </div>
        </div>
        <div id="message" class="message"></div>
    </div>
</div>

<script>
    // ------------------- WebSocket з'єднання -------------------
    let socket = null;
    let playerId = null;
    let roomId = null;
    let currentGameState = null;

    // Функції для відображення гри (адаптовані під мультиплеєр)
    function renderGame(state) {
        if (!state) return;
        // Відображаємо карту на столі
        const tableDiv = document.getElementById('tableCard');
        tableDiv.innerHTML = '';
        if (state.tableCard) {
            tableDiv.appendChild(renderCard(state.tableCard, false));
        }

        // Відображаємо список гравців
        const playersDiv = document.getElementById('playersList');
        playersDiv.innerHTML = '';
        for (let [id, player] of Object.entries(state.players)) {
            const div = document.createElement('div');
            div.className = 'player' + (state.currentPlayer === id ? ' current' : '');
            div.innerText = `${player.name} (${player.cardsCount} карт)`;
            playersDiv.appendChild(div);
        }

        // Відображаємо руку поточного гравця
        const handDiv = document.getElementById('playerHand');
        handDiv.innerHTML = '';
        const myCards = state.players[playerId]?.cards || [];
        myCards.forEach((card, idx) => {
            handDiv.appendChild(renderCard(card, true, idx));
        });
        if (myCards.length === 0) {
            handDiv.innerHTML = '<p style="color:white;">✨ Ви перемогли! ✨</p>';
        }

        // Повідомлення про хід
        const isMyTurn = (state.currentPlayer === playerId);
        const msgDiv = document.getElementById('message');
        if (!isMyTurn) {
            msgDiv.innerText = `Хід гравця: ${state.players[state.currentPlayer]?.name}`;
        } else {
            msgDiv.innerText = 'Ваш хід!';
        }
    }

    function sendMove(action, data) {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ action, ...data }));
        }
    }

    // Обробка натискання на карту
    function playCard(card, index) {
        if (currentGameState && currentGameState.currentPlayer === playerId) {
            sendMove('playCard', { card, index });
        } else {
            showMessage("Зараз не ваш хід!");
        }
    }

    function drawCard() {
        if (currentGameState && currentGameState.currentPlayer === playerId) {
            sendMove('drawCard', {});
        } else {
            showMessage("Зараз не ваш хід!");
        }
    }

    // Підключення WebSocket
    function connectToServer(room, playerName, isCreating) {
        // Замініть URL на ваш WebSocket сервер
        const wsUrl = "wss://ваш-сервер.com"; // або ws://localhost:8080 для тесту
        socket = new WebSocket(wsUrl);

        socket.onopen = () => {
            if (isCreating) {
                socket.send(JSON.stringify({ action: 'createRoom', playerName }));
            } else {
                socket.send(JSON.stringify({ action: 'joinRoom', roomCode: room, playerName }));
            }
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            switch (data.type) {
                case 'roomCreated':
                    playerId = data.playerId;
                    roomId = data.roomCode;
                    document.getElementById('lobby').style.display = 'none';
                    document.getElementById('gameArea').style.display = 'block';
                    showMessage(`Кімната ${roomId} створена. Поділіться кодом з друзями!`);
                    break;
                case 'joined':
                    playerId = data.playerId;
                    roomId = data.roomCode;
                    document.getElementById('lobby').style.display = 'none';
                    document.getElementById('gameArea').style.display = 'block';
                    showMessage(`Ви приєдналися до кімнати ${roomId}`);
                    break;
                case 'gameState':
                    currentGameState = data.state;
                    renderGame(currentGameState);
                    break;
                case 'error':
                    showMessage(data.message);
                    break;
            }
        };
    }

    // Обробники інтерфейсу
    document.getElementById('createRoom').onclick = () => {
        const name = document.getElementById('playerName').value.trim() || "Гравець";
        connectToServer(null, name, true);
    };
    document.getElementById('joinRoom').onclick = () => {
        const name = document.getElementById('playerName').value.trim() || "Гравець";
        const room = document.getElementById('roomCode').value.trim();
        if (!room) {
            alert("Введіть код кімнати");
            return;
        }
        connectToServer(room, name, false);
    };
    document.getElementById('drawBtn').onclick = drawCard;
    document.getElementById('resetBtn').onclick = () => {
        if (confirm("Почати нову гру?")) {
            sendMove('resetGame', {});
        }
    };

    function showMessage(msg) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = msg;
        setTimeout(() => {
            if (msgDiv.innerText === msg) msgDiv.innerText = '';
        }, 3000);
    }

    // Функція renderCard та інші допоміжні (аналогічні до попередньої версії)
    function renderCard(card, isClickable = false, index = null) {
        // ... (той самий код, що в попередньому index.html)
        // Тут потрібно скопіювати функцію renderCard з попередньої версії
        // Для стислості я її не дублюю, але вона повинна бути повністю такою ж.
    }
</script>
</body>
</html>
